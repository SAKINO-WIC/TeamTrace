<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamTrace 系统维护中</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #617089;
        --line: rgba(63, 84, 122, 0.18);
        --blue: #2458ff;
        --orange: #f2994a;
        --bg: #f7f2e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 16%, rgba(242, 153, 74, 0.22), transparent 32%),
          radial-gradient(circle at 82% 18%, rgba(36, 88, 255, 0.16), transparent 28%),
          linear-gradient(180deg, #fff8ec, var(--bg));
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Microsoft YaHei", sans-serif;
      }

      .stage {
        width: min(960px, calc(100vw - 32px));
        min-height: min(620px, calc(100vh - 32px));
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        align-items: center;
        gap: 42px;
        padding: 52px;
        border: 1px solid var(--line);
        border-radius: 32px;
        background: rgba(255, 252, 246, 0.82);
        box-shadow: 0 30px 90px rgba(43, 54, 85, 0.18);
      }

      .copy {
        position: relative;
        z-index: 2;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(36, 88, 255, 0.1);
        color: #2046bd;
        font-size: 13px;
        font-weight: 800;
      }

      h1 {
        margin: 22px 0 14px;
        max-width: 560px;
        font-size: clamp(36px, 6vw, 66px);
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 560px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.75;
      }

      .actions {
        margin-top: 30px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button,
      a {
        height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        border: 0;
        padding: 0 18px;
        font: inherit;
        font-weight: 850;
        text-decoration: none;
        cursor: pointer;
      }

      button {
        background: var(--blue);
        color: #fbfcff;
        box-shadow: 0 14px 30px rgba(36, 88, 255, 0.22);
      }

      a {
        background: rgba(23, 32, 51, 0.08);
        color: var(--ink);
      }

      .game {
        position: relative;
        height: 360px;
        border-bottom: 4px solid rgba(23, 32, 51, 0.2);
      }

      .cat {
        position: absolute;
        left: 42px;
        bottom: 0;
        width: 118px;
        height: 118px;
        animation: hop 1.65s ease-in-out infinite;
      }

      .cat-body {
        position: absolute;
        inset: 18px 7px 0;
        border-radius: 42px 42px 30px 30px;
        background: #2a3348;
      }

      .cat-face {
        position: absolute;
        top: 0;
        left: 10px;
        width: 98px;
        height: 80px;
        border-radius: 38px 38px 34px 34px;
        background: #34405a;
      }

      .cat-face::before,
      .cat-face::after {
        content: "";
        position: absolute;
        top: -11px;
        width: 34px;
        height: 34px;
        background: #34405a;
        transform: rotate(45deg);
      }

      .cat-face::before {
        left: 9px;
      }

      .cat-face::after {
        right: 9px;
      }

      .eyes {
        position: absolute;
        top: 33px;
        left: 24px;
        right: 24px;
        display: flex;
        justify-content: space-between;
      }

      .eyes span {
        width: 9px;
        height: 13px;
        border-radius: 999px;
        background: #fff8ec;
      }

      .fish {
        position: absolute;
        right: 24px;
        bottom: 52px;
        width: 74px;
        height: 38px;
        border-radius: 999px;
        background: var(--orange);
        animation: swim 2.4s linear infinite;
      }

      .fish::before {
        content: "";
        position: absolute;
        right: -16px;
        top: 8px;
        border-left: 20px solid var(--orange);
        border-top: 11px solid transparent;
        border-bottom: 11px solid transparent;
      }

      .fish::after {
        content: "";
        position: absolute;
        left: 18px;
        top: 11px;
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--ink);
      }

      .cloud {
        position: absolute;
        top: 46px;
        right: 14px;
        color: rgba(23, 32, 51, 0.34);
        font-size: 13px;
        font-weight: 850;
        animation: drift 5s ease-in-out infinite;
      }

      .note {
        position: absolute;
        right: 32px;
        bottom: 18px;
        color: rgba(23, 32, 51, 0.42);
        font-size: 12px;
        font-weight: 800;
      }

      @keyframes hop {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }

      @keyframes swim {
        0% { transform: translateX(0); }
        55% { transform: translateX(-130px); }
        100% { transform: translateX(0); }
      }

      @keyframes drift {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(-18px); }
      }

      @media (max-width: 820px) {
        body {
          overflow: auto;
        }

        .stage {
          grid-template-columns: 1fr;
          padding: 30px;
        }

        .game {
          height: 260px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="copy">
        <span class="tag">TeamTrace · 系统维护</span>
        <h1>摸鱼终结者正在整理现场</h1>
        <p>
          网站暂时没有连上服务，可能是后端重启、部署发版或系统维护。请稍后重试，当前页面不会影响你的账号和数据。
        </p>
        <div class="actions">
          <button type="button" onclick="window.location.reload()">重新尝试</button>
          <a href="/">返回首页</a>
        </div>
      </section>
      <section class="game" aria-label="maintenance illustration">
        <div class="cloud">SERVICE RESTARTING</div>
        <div class="cat">
          <div class="cat-body"></div>
          <div class="cat-face">
            <div class="eyes"><span></span><span></span></div>
          </div>
        </div>
        <div class="fish"></div>
        <div class="note">按刷新键再次检查服务</div>
      </section>
    </main>
  </body>
</html>
