# 可选：本机 Docker MySQL。用 Sealos 云库时不需要本文件。
# 启动：bash scripts/start-local-db.sh
# 或：docker compose -f docker-compose.dev.yml up -d
services:
  mysql:
    image: mysql:8.0
    container_name: team-trace-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: teamtrace_dev
      MYSQL_DATABASE: team_trace
    ports:
      - "3306:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pteamtrace_dev"]
      interval: 4s
      timeout: 5s
      retries: 30
      start_period: 15s
    volumes:
      - team-trace-mysql-dev-data:/var/lib/mysql

volumes:
  team-trace-mysql-dev-data:
