# DB_URL / DB_USERNAME / DB_PASSWORD 必须由环境变量注入。
# Sealos 云库：cp .env.sealos.example .env.sealos，填 JDBC 与账号；JDBC 含 & 时须写成 DB_URL='jdbc:...&...' 再 bash scripts/run-dev.sh。
# 勿单独 ./mvnw spring-boot:run：子进程不会读 .env，会出现字面量 ${DB_URL}。
# 无云库时可选：bash scripts/start-local-db.sh（Docker 本机 MySQL）后再 run-dev。
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 远程库 DDL 较慢时，适当拉长建连等待（毫秒）；根治仍依赖网络/库端超时与 JDBC socketTimeout
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT_MS:120000}

spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
server.port=${SERVER_PORT:8082}
jwt.secret=${JWT_SECRET}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:604800}
teamtrace.security.require-https-for-auth=${TEAMTRACE_REQUIRE_HTTPS_FOR_AUTH:true}

# 默认管理员（从环境变量注入；为空则不创建；推荐 ADMIN_EMAIL）
teamtrace.admin.email=${ADMIN_EMAIL:}
teamtrace.admin.phone=${ADMIN_PHONE:}
teamtrace.admin.password=${ADMIN_PASSWORD:}
teamtrace.admin.name=${ADMIN_NAME:admin}

# 邮件发信：auto=有 BREVO_API_KEY 优先 Brevo，否则 ResEND，否则 SMTP（本地 QQ）
teamtrace.email.provider=${EMAIL_PROVIDER:auto}
teamtrace.email.brevo.api-base-url=${BREVO_API_BASE_URL:https://api.brevo.com}
teamtrace.email.brevo.connect-timeout-ms=${BREVO_CONNECT_TIMEOUT_MS:10000}
teamtrace.email.brevo.read-timeout-ms=${BREVO_READ_TIMEOUT_MS:15000}
teamtrace.email.resend.api-base-url=${RESEND_API_BASE_URL:https://api.resend.com}
teamtrace.email.resend.connect-timeout-ms=${RESEND_CONNECT_TIMEOUT_MS:10000}
teamtrace.email.resend.read-timeout-ms=${RESEND_READ_TIMEOUT_MS:15000}

# QQ 邮箱 SMTP（本地开发；Render Free 无法连 465/587）
spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.qq.com}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECT_TIMEOUT_MS:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_READ_TIMEOUT_MS:15000}

teamtrace.email.verification.expire-minutes=${EMAIL_CODE_EXPIRE_MINUTES:5}
teamtrace.email.verification.resend-seconds=${EMAIL_CODE_RESEND_SECONDS:60}

# 子任务截止前提醒（@Scheduled，默认每 15 分钟扫描一次）
teamtrace.scheduler.subtask-deadline-reminder.enabled=true
teamtrace.scheduler.subtask-deadline-reminder.fixed-delay-ms=900000
teamtrace.scheduler.subtask-deadline-reminder.initial-delay-ms=120000
teamtrace.scheduler.subtask-deadline-reminder.lookahead-hours=24

# HTTP 操作日志（同步写 operation_logs；不落请求体）
teamtrace.audit.http.enabled=true

# 文件上传大小限制（Tomcat默认1MB太小，头像都传不了）
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=10MB
